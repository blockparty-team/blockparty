<ion-item>
  <ion-thumbnail slot="start">
    <img
      [src]="imageSrc()"
      [alt]="asset().properties.name + ' image'"
      (error)="onImageError($event)"
    />
  </ion-thumbnail>

  <ion-label>
    <h2>{{ asset().properties.name }}</h2>
    <p>{{ asset().properties.description }}</p>
  </ion-label>

  <ion-icon
    slot="end"
    name="map"
    (click)="onShowOnMap(asset().geometry.coordinates)"
  >
  </ion-icon>
</ion-item>

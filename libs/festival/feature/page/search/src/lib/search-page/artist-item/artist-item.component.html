<ion-item [routerLink]="['/tabs', routeName.Artist, artist().name]">
  <ion-avatar slot="start">
    @if (showPlaceholder()) {
      <ion-icon name="person-outline" aria-hidden="true"></ion-icon>
    } @else {
      <img
        [src]="imageSrc()"
        [alt]="artist().name + ' photo'"
        (error)="onImageError()"
      />
    }
  </ion-avatar>

  <ion-label>
    <h2>{{ artist().name }}</h2>
    @for (act of artist().timetable; track act) {
      <p>{{ (act?.day)!.name }} | {{ act?.start_time | date: 'HH:mm' }}</p>
    }
  </ion-label>
</ion-item>

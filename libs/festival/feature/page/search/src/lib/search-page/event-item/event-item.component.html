<ion-item>
  <div slot="start" class="start-slot">
    <ion-badge [color]="badgeColor.event">Event </ion-badge>
  </div>

  <ion-label [routerLink]="['/', routeName.Event, event().id]">
    <h2>{{ event().name }}</h2>
    <p>{{ event().description }}</p>
  </ion-label>

  <ion-icon
    slot="end"
    name="map"
    (click)="onZoomToEventOnMap(event().id, event().bounds!)"
  >
  </ion-icon>
</ion-item>
